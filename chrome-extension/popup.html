<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Job Hunter</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>AI Job Hunter</h1>
            <div id="site-badge" class="badge badge--gray">No job page detected</div>
        </header>

        <div id="scraped-preview" class="preview hidden">
            <div class="preview-field">
                <span class="preview-label">Title</span>
                <span id="preview-title" class="preview-value">—</span>
            </div>
            <div class="preview-field">
                <span class="preview-label">Company</span>
                <span id="preview-company" class="preview-value">—</span>
            </div>
            <div class="preview-field">
                <span class="preview-label">Source</span>
                <span id="preview-source" class="preview-value">—</span>
            </div>
        </div>

        <div class="form-group">
            <label for="api-token">API Token</label>
            <div class="token-input-group">
                <input type="password" id="api-token" placeholder="Paste your API token" autocomplete="off">
                <button id="toggle-token" class="btn-icon" title="Show/hide token" type="button">&#128065;</button>
            </div>
            <small>Saved locally in your browser.</small>
        </div>

        <div class="form-group">
            <label for="api-base-url">API Base URL</label>
            <input type="url" id="api-base-url" value="http://localhost:8000" placeholder="http://localhost:8000">
        </div>

        <button id="save-btn" class="btn btn-primary" disabled>
            Save to Job Hunter
        </button>

        <div id="status" class="status hidden"></div>

        <footer>
            <small>v1.0.0 &middot; <a href="https://github.com" target="_blank">Help</a></small>
        </footer>
    </div>

    <script src="popup.js"></script>
</body>
</html>
